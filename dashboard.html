<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Medicas ERP - Workspace</title>
    <!-- CSS imports -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <div class="app-container">
        <!-- Collapsible Navigation Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <svg class="logo-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span class="logo-text">Aegis Medicas</span>
            </div>

            <!-- Sidebar Quick Module Finder -->
            <div class="sidebar-search">
                <div class="input-icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="menu-search" class="input-field" placeholder="Search modules..." style="padding-top: 8px; padding-bottom: 8px;">
                </div>
            </div>

            <!-- Navigation Links -->
            <nav class="sidebar-menu">
                <a href="#" class="menu-item active" data-view="dashboard">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>
                    <span class="menu-text">Dashboard</span>
                </a>
                <a href="#" class="menu-item" data-view="medicine">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-4.12 2.5 2.5 0 0 1 0-4.88 2.5 2.5 0 0 1 0-4.12A2.5 2.5 0 0 1 9.5 2zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-4.12 2.5 2.5 0 0 0 0-4.88 2.5 2.5 0 0 0 0-4.12A2.5 2.5 0 0 0 14.5 2z"></path></svg>
                    <span class="menu-text">Medicines</span>
                </a>
                <a href="#" class="menu-item" data-view="inventory">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    <span class="menu-text">Inventory</span>
                </a>
                <a href="#" class="menu-item" data-view="billing">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="16" y1="18" x2="22" y2="18"></line><line x1="8" y1="18" x2="10" y2="18"></line><line x1="3" y1="18" x2="5" y2="18"></line><line x1="3" y1="14" x2="7" y2="14"></line><line x1="10" y1="14" x2="14" y2="14"></line><line x1="17" y1="14" x2="21" y2="14"></line><line x1="3" y1="10" x2="9" y2="10"></line><line x1="12" y1="10" x2="16" y2="10"></line><line x1="19" y1="10" x2="21" y2="10"></line><line x1="3" y1="6" x2="6" y2="6"></line><line x1="9" y1="6" x2="13" y2="6"></line><line x1="16" y1="6" x2="21" y2="6"></line></svg>
                    <span class="menu-text">POS Billing</span>
                </a>
                <a href="#" class="menu-item" data-view="customer">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span class="menu-text">Customers</span>
                </a>
                <a href="#" class="menu-item" data-view="supplier">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span class="menu-text">Suppliers</span>
                </a>
                <a href="#" class="menu-item" data-view="purchase">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span class="menu-text">Purchase Orders</span>
                </a>
                <a href="#" class="menu-item" data-view="prescription">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                    <span class="menu-text">Prescriptions</span>
                </a>
                <a href="#" class="menu-item" data-view="returns">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    <span class="menu-text">Returns</span>
                </a>
                <a href="#" class="menu-item" data-view="employee">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 22v-1a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span class="menu-text">Employees</span>
                </a>
                <a href="#" class="menu-item" data-view="finance">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    <span class="menu-text">Finance</span>
                </a>
                <a href="#" class="menu-item" data-view="report">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span class="menu-text">Reports</span>
                </a>
                <a href="#" class="menu-item" data-view="settings">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <span class="menu-text">Settings</span>
                </a>
            </nav>

            <!-- Sidebar Bottom Footer -->
            <div class="sidebar-footer">
                <div class="theme-switch-wrapper">
                    <span class="theme-switch-label">Dark Theme</span>
                    <button class="theme-switch-btn" id="theme-switch" aria-label="Toggle Theme Mode"></button>
                </div>
                <!-- Profile Panel -->
                <div class="user-profile-widget" id="profile-widget">
                    <div class="user-avatar" id="user-avatar-initials">AD</div>
                    <div class="user-info">
                        <span class="user-name" id="user-display-name">Admin</span>
                        <span class="user-role" id="user-display-role">Administrator</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main SPA View Wrapper -->
        <main class="main-wrapper">
            <!-- App Toolbar -->
            <header class="top-header glass-panel">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="sidebar-toggle" aria-label="Toggle Sidebar Menu">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="header-title">
                        <h2 id="view-title">Dashboard</h2>
                    </div>
                </div>

                <div class="header-right">
                    <!-- Date Widget -->
                    <div class="header-date">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <span id="current-date-txt">Loading Date...</span>
                    </div>
                    <!-- Notification Bell Button -->
                    <button class="header-icon-btn" id="notifications-toggle" title="Open Notifications">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="badge-count" id="notif-badge" style="display:none;">0</span>
                    </button>
                </div>
            </header>

            <!-- Dynamic Workspace Content Pane -->
            <section id="main-content">
                <!-- Skeleton loader on load -->
                <div class="stats-grid">
                    <div class="card glass-panel skeleton" style="height: 120px;"></div>
                    <div class="card glass-panel skeleton" style="height: 120px;"></div>
                    <div class="card glass-panel skeleton" style="height: 120px;"></div>
                    <div class="card glass-panel skeleton" style="height: 120px;"></div>
                </div>
            </section>
        </main>

        <!-- Right Side Slide-out Notification Drawer -->
        <div class="notification-drawer" id="notification-drawer">
            <div class="notification-drawer-header">
                <h3>Notifications</h3>
                <button class="modal-close-icon" id="close-notif-btn" aria-label="Close notification panel">&times;</button>
            </div>
            <div class="notification-drawer-body" id="notif-drawer-body">
                <div class="text-muted" style="text-align: center; margin-top: 50px;">No alerts. Everything is running smoothly.</div>
            </div>
        </div>
    </div>

    <!-- Source file imports in dependency order -->
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/medicine.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/customer.js"></script>
    <script src="js/supplier.js"></script>
    <script src="js/purchase.js"></script>
    <script src="js/report.js"></script>
    <script src="js/settings.js"></script>

</body>
</html>
